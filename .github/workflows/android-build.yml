name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Setup Java JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Install Dependencies
        run: npm install

      - name: Build Web App
        run: npm run build

      - name: Setup Capacitor Android
        run: |
          npx cap add android
          npx cap sync

      - name: Generate Assets (Icons)
        # This will run only if you have uploaded a 'resources' folder with icon.png
        run: |
          if [ -d "resources" ]; then
            npx capacitor-assets generate --android
          else
            echo "No resources folder found, skipping icon generation."
          fi

      - name: Build APK (Debug Unsigned)
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SahamScout-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
